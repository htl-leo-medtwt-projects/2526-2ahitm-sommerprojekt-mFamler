<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Sprite Game</title>
	<link rel="stylesheet" href="./css/spritegame.css">
	<script src="./js/spritegame_detectCollisions.js" defer></script>
	<script src="./js/spritegame_keyevents.js" defer></script>
	<script src="./js/spritegame_player.js" defer></script>
	<script src="./js/spritegame_main.js" defer></script>
	<script src="./js/spritegame_loop.js" defer></script>
</head>
<!-- body == id="body"!-->
<body id="body">

	<div id="home">
		<div id="head">
			<div id="logo">
				<img src="./img/logo/pokemon-23-logo-png-transparent.png" alt="pokemon logo">
			</div>
		</div>

		<div id="options">
			<div id="start" class="invis" onclick="startGame()"></div>
			<div id="rules" class="invis" onclick="showRules()"></div>
			<div id="idk" class="invis" onclick="showScoreBoard()"></div>
		</div>

		<div id="text"></div>
	</div>

	<div id="game">
		<div id="dashboard">
			<div id="debug_output"></div>
		</div>
		
		<div id="surface">
			<div id="player">
				<img id="spriteImg" src = "./img/kirby.png" alt="sprite"/>
			</div>
			<div id="redBox"><!--BOX FÜR COLLISSION-DETECTION-BEISPIEL!--></div>
		</div>
	</div>

	<div id="score">
		<div id="scoreboard">
			<div>
				<h1>SCOREBOARD</h1>
			</div>
			<div id="playerInfo">
				<div>name // time // score</div>
			</div>
			<div onclick="goBack()" class="back">back</div>
		</div>
	</div>
	
</body>
</html>
